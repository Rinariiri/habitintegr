<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pastel Habit Widget</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#fffafb;
  --panel:#ffffff;
  --border:#f1cfd9;
  --border-strong:#e8bcc9;
  --soft:#fff4f7;
  --text:#8c868a;
  --muted:#c9aeb8;
  --accent:#f7cad7;
  --shadow:0 6px 22px rgba(215,176,189,0.18);
}

*{box-sizing:border-box}

html,body{
  margin:0;
  padding:0;
  background:transparent;
  font-family:"Nunito",system-ui,sans-serif;
  color:var(--text);
}

body{padding:10px;}

.widget{
  width:100%;
  max-width:340px;
  margin:0 auto;
  background:var(--bg);
  border:2px solid var(--border);
  border-radius:12px;
  box-shadow:var(--shadow);
  padding:10px 8px 8px;
  position:relative;
}

.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:6px;
}

.title{
  display:flex;
  align-items:center;
  gap:6px;
  color:var(--muted);
  font-size:12px;
  font-weight:700;
  letter-spacing:.03em;
  text-transform:lowercase;
}

.tiny-icon{
  width:12px;
  height:12px;
  border:1.5px solid var(--border-strong);
  border-radius:3px;
  position:relative;
}

.tiny-icon::before,
.tiny-icon::after{
  content:"";
  position:absolute;
  left:2px;
  right:2px;
  height:1px;
  background:var(--border-strong);
}

.tiny-icon::before{top:3px;}
.tiny-icon::after{top:7px;}

.window-buttons{
  display:flex;
  gap:5px;
}

.window-btn{
  width:14px;
  height:14px;
  border:1.5px solid var(--border-strong);
  border-radius:2px;
  position:relative;
}

.window-btn.expand::before{
  content:"";
  position:absolute;
  width:5px;
  height:5px;
  right:2px;
  top:2px;
  border-top:1.5px solid var(--border-strong);
  border-right:1.5px solid var(--border-strong);
}

.window-btn.expand::after{
  content:"";
  position:absolute;
  width:5px;
  height:5px;
  left:2px;
  bottom:2px;
  border-left:1.5px solid var(--border-strong);
  border-bottom:1.5px solid var(--border-strong);
}

.window-btn.close::before,
.window-btn.close::after{
  content:"";
  position:absolute;
  left:3px;
  right:3px;
  top:6px;
  height:1.5px;
  background:var(--border-strong);
}

.window-btn.close::before{transform:rotate(45deg);}
.window-btn.close::after{transform:rotate(-45deg);}

.progress-row{
  display:flex;
  align-items:center;
  gap:8px;
  margin:6px 4px 8px;
}

.progress-bar{
  flex:1;
  height:6px;
  background:#f4e6ea;
  border-radius:999px;
  overflow:hidden;
}

.progress-fill{
  height:100%;
  width:0%;
  background:var(--accent);
  transition:width .25s ease;
}

.progress-text{
  font-size:13px;
  font-weight:700;
  color:#a88f98;
  min-width:36px;
  text-align:right;
}

.habits{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.habit{
  display:grid;
  grid-template-columns:18px minmax(0,1fr);
  align-items:center;
  gap:8px;
  min-height:34px;
  padding:7px 8px;
  background:var(--panel);
  border:1.5px solid var(--border);
  border-radius:4px;
}

.checkbox{
  appearance:none;
  width:14px;
  height:14px;
  border:1.5px solid var(--border-strong);
  border-radius:2px;
  background:#fff;
  position:relative;
  cursor:pointer;
}

.checkbox:checked{
  background:var(--accent);
  border-color:var(--accent);
}

.checkbox:checked::after{
  content:"✓";
  position:absolute;
  inset:0;
  display:grid;
  place-items:center;
  font-size:10px;
  color:#fff;
  font-weight:700;
}

.checkbox:disabled{
  cursor:wait;
  opacity:.7;
}

.habit-text{
  font-size:14px;
  font-weight:600;
  color:#8a8588;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  transition:all .15s ease;
}

/* completed habit */
.checkbox:checked + .habit-text{
  text-decoration: line-through;
  color:#bfb5b9;
  opacity:0.75;
}

.footer{
  margin-top:8px;
  padding-top:3px;
  text-align:center;
  font-size:8px;
  letter-spacing:0.18em;
  color:#d7c8ce;
  font-weight:700;
}

.habit:hover{
  background:#fff6f8;
}

.state{
  font-size:12px;
  color:#b59aa4;
  text-align:center;
  padding:12px 6px;
}

.hidden{
  display:none;
}
</style>
</head>

<body>
<div class="widget">
  <div class="topbar">
    <div class="title">
      <span class="tiny-icon"></span>
      <span>habit tracker</span>
    </div>

    <div class="window-buttons">
      <span class="window-btn expand"></span>
      <span class="window-btn close"></span>
    </div>
  </div>

  <div class="progress-row">
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="progress-text" id="progressText">0%</div>
  </div>

  <div id="loadingState" class="state">loading habits...</div>
  <div id="errorState" class="state hidden"></div>
  <div class="habits" id="habitsList"></div>

  <div class="footer">SOMLUTION</div>
</div>

<script>
const habitsList = document.getElementById("habitsList");
const loadingState = document.getElementById("loadingState");
const errorState = document.getElementById("errorState");
const progressFill = document.getElementById("progressFill");
const progressText = document.getElementById("progressText");

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, function(m){
    return ({
      "&":"&amp;",
      "<":"&lt;",
      ">":"&gt;",
      '"':"&quot;",
      "'":"&#39;"
    })[m];
  });
}

function updateProgressFromData(habits){
  const total = habits.length;
  const done = habits.filter(h => h.done).length;
  const percent = total ? Math.round((done / total) * 100) : 0;
  progressFill.style.width = percent + "%";
  progressText.textContent = percent + "%";
}

function renderHabits(habits){
  habitsList.innerHTML = "";

  if (!habits.length){
    habitsList.innerHTML = `<div class="state">no habits found</div>`;
    updateProgressFromData([]);
    return;
  }

  habits.forEach(habit => {
    const row = document.createElement("label");
    row.className = "habit";
    row.innerHTML = `
      <input
        class="checkbox"
        type="checkbox"
        data-id="${escapeHtml(habit.id)}"
        data-done="${habit.done ? "1" : "0"}"
        ${habit.done ? "checked" : ""}
      >
      <div class="habit-text">${escapeHtml(habit.name)}</div>
    `;
    habitsList.appendChild(row);
  });

  updateProgressFromData(habits);

  habitsList.querySelectorAll(".checkbox").forEach(cb => {
    cb.addEventListener("change", async (event) => {
      const checkbox = event.currentTarget;
      const habitId = checkbox.dataset.id;
      const wasDone = checkbox.dataset.done === "1";
      const wantsChecked = checkbox.checked;

      if (wasDone && !wantsChecked){
        checkbox.checked = true;
        return;
      }

      if (!wasDone && wantsChecked){
        checkbox.disabled = true;

        try{
          const res = await fetch("/api/habits/check", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ habitId })
          });

          const data = await res.json();

          if (!res.ok){
            throw new Error(data.error || "Failed to create tracking page");
          }

          checkbox.dataset.done = "1";
          checkbox.checked = true;
          await loadHabits();
        }catch(err){
          checkbox.checked = false;
          alert(err.message || "Could not update Notion");
        }finally{
          checkbox.disabled = false;
        }
      }
    });
  });
}

async function loadHabits(){
  loadingState.classList.remove("hidden");
  errorState.classList.add("hidden");
  habitsList.innerHTML = "";

  try{
    const res = await fetch("/api/habits");
    const data = await res.json();

    if (!res.ok){
      throw new Error(data.error || "Failed to load habits");
    }

    loadingState.classList.add("hidden");
    renderHabits(data.habits || []);
  }catch(err){
    loadingState.classList.add("hidden");
    errorState.classList.remove("hidden");
    errorState.textContent = err.message || "Something went wrong";
  }
}

loadHabits();
</script>
</body>
</html>
